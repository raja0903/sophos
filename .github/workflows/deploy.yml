name: Build and Deploy Sophos AI

on:
  push:
    branches:
      - master
      - feature/dockerization

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Create .env file
        run: |
          cat > $GITHUB_WORKSPACE/.env << ENVEOF
          OLLAMA_BASE_URL=${{ secrets.OLLAMA_BASE_URL }}
          OLLAMA_MODEL=${{ secrets.OLLAMA_MODEL }}
          QDRANT_API_KEY=
          TEAMS_WEBHOOK_URL=
          REACT_APP_API_URL=${{ secrets.REACT_APP_API_URL }}
          ENVEOF

      - name: Check changed files
        id: changes
        run: |
          if git rev-parse HEAD~1 > /dev/null 2>&1; then
            echo "Normal commit - diffing with previous"
            git diff --name-only HEAD~1 HEAD > /tmp/changed_files.txt
          else
            echo "First commit - treating all files as changed"
            git diff-tree --no-commit-id -r --name-only HEAD > /tmp/changed_files.txt
          fi

          cat /tmp/changed_files.txt

          if grep -qE "^sophos_ai_backend/" /tmp/changed_files.txt; then
            echo "backend=true" >> $GITHUB_OUTPUT
          else
            echo "backend=false" >> $GITHUB_OUTPUT
          fi

          if grep -qE "^sophos-ai-frontend/" /tmp/changed_files.txt; then
            echo "frontend=true" >> $GITHUB_OUTPUT
          else
            echo "frontend=false" >> $GITHUB_OUTPUT
          fi

      - name: Build backend image
        if: steps.changes.outputs.backend == 'true'
        run: |
          cd $GITHUB_WORKSPACE
          docker compose build backend

      - name: Build frontend image
        if: steps.changes.outputs.frontend == 'true'
        run: |
          cd $GITHUB_WORKSPACE
          docker compose build frontend

      - name: Stop old containers
        run: |
          cd $GITHUB_WORKSPACE
          docker compose down

      - name: Deploy
        run: |
          cd $GITHUB_WORKSPACE
          docker compose up -d

      - name: Verify deployment
        run: |
          echo "Waiting for backend to be ready..."
          for i in {1..10}; do
            if curl -sf http://localhost:8000/; then
              echo "Backend is up!"
              exit 0
            fi
            echo "Attempt $i failed, waiting 15s..."
            sleep 15
          done
          echo "Backend failed to start"
          exit 1
