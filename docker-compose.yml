services:

  qdrant:
    image: qdrant/qdrant:latest
    container_name: sophos-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  backend:
    build:
      context: ./sophos_ai_backend
      dockerfile: Dockerfile
    image: sophos-backend:latest
    container_name: sophos-backend
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - qdrant
    restart: unless-stopped

  frontend:
    build:
      context: ./sophos-ai-frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=${REACT_APP_API_URL}
    image: sophos-frontend:latest
    container_name: sophos-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  qdrant_data:
  backend_data:
